<!DOCTYPE html>
<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>

<form action="" method="post">

	<label for="name">Name</label>
	<input type="text" id="name" name="name" placeholder="Name" required>

	<label for="email">Email</label>
	<input type="email" id="email" name="email" placeholder="Email" required>

	<label>Gender</label>
	<input type="radio" name="gender" id="gen-m" value="male" required>
	<label for="gen-m">Male</label>

	<input type="radio" name="gender" id="gen-f" value="female" required>
	<label for="gen-f">Female</label>

	<label for="laptop">Laptop Brands</label>
	<select id="laptop" name="laptop" required>
		<option value="">--Select--</option>
		<option value="apple">Apple</option>
		<option value="asus">Asus</option>
		<option value="hp">HP</option>
	</select>

	<label for="age">Age</label>
	<input type="number" id="age" name="age" required>

	<label for="dob">DOB</label>
	<input type="date" id="dob" name="dob" required>

	<label for="password">Password</label>
	<input type="password" id="password" name="password" placeholder="Password" required>

	<label for="portfolio">Profile URL</label>
	<input type="url" id="portfolio" name="portfolio" required>

	<button type="submit">Submit</button>

</form>

<script src="./script.js"></script>

</body>

</html>

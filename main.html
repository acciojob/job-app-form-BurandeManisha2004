<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form action="" method="post">
		<label for="name">Name</label>
		<input type="name" id="name" placeholder="Name" required>
		<label for="email">Email</label>
		<input type="email" id="email" placeholder="Email" required>
		<label for="gen-m">Gender</label>
		<input type="radio" name="gen" id="gen-m" required>Male
		<input type="radio" name="gen" id="gen-f" required>Female
		<label for="laptop">Laptop Brands</label>
		<select id="laptop">
			<option>Apple</option>
			<option>Asus</option>
			<option>HP</option>
		</select>
		<label for="age">Age</label>
<input type="number" id="age" required>
		<label for="dob">DOB</label>
<input type="date" id="dob" required>

			<label for="password">Password</label>
<input type="password" id="password" required placeholder="Password">
			<label for="portfolio">Profile Url</label>
<input type="url" id="portfolio" required>
		<button type="submit">submit</button>
		
		
		
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
